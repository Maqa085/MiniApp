<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElanımAz - Azərbaycanın Elan Platforması</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        :root {
            --bg-dark: #020617;
            --card-bg: #0f172a;
            --accent-blue: #2563eb;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% -20%, #1e40af 0%, #020617 80%);
            color: #f8fafc;
            min-height: 100vh;
            padding-bottom: 120px;
        }

        /* 2-2 Grid Sistemi və Kartlar */
        .ads-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 12px;
        }

        .ad-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .ad-card:active { transform: scale(0.97); }

        .ad-image {
            width: 100%;
            aspect-ratio: 1 / 1; /* Kvadrat görünüş */
            object-fit: cover;
            background: #1e293b;
        }

        .ad-info { padding: 10px; flex-grow: 1; }
        .ad-title { font-size: 0.85rem; font-weight: 600; color: #cbd5e1; height: 2.4rem; overflow: hidden; }
        .ad-price { font-size: 1.1rem; font-weight: 800; color: #60a5fa; margin-top: 4px; }

        .btn-contact {
            background: var(--accent-blue);
            color: white;
            text-align: center;
            padding: 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 8px;
            display: block;
            transition: opacity 0.2s;
        }

        /* Naviqasiya Paneli */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 400px; background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px); border-radius: 24px;
            display: flex; justify-content: space-around; padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1); z-index: 1000;
        }

        .nav-item { opacity: 0.4; transition: 0.3s; cursor: pointer; text-align: center; }
        .nav-item.active { opacity: 1; color: #3b82f6; }

        /* Səhifə Keçidləri */
        .page { display: none; padding-top: 20px; animation: pageIn 0.3s ease-out; }
        .page.active { display: block; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Modal */
        .full-modal {
            display: none; position: fixed; inset: 0; background: var(--bg-dark);
            z-index: 2000; overflow-y: auto; padding: 20px;
        }
    </style>
</head>
<body>

    <header class="p-6">
        <h1 class="text-3xl font-black tracking-tighter">ELANIM<span class="text-blue-600">AZ</span></h1>
        <div class="h-1 w-12 bg-blue-600 rounded-full mt-1"></div>
    </header>

    <div id="elanlar-page" class="page active">
        <div class="ads-grid" id="ads-list">
            </div>
    </div>

    <div id="chat-page" class="page px-4">
        <h2 class="text-2xl font-bold mb-6">Mesajlarım</h2>
        <div id="active-chats" class="space-y-4">
            <div class="bg-slate-900/50 p-6 rounded-2xl border border-white/5 text-center opacity-50">
                Aktiv mesajınız yoxdur.
            </div>
        </div>
    </div>

    <div id="profil-page" class="page px-4">
        <div class="bg-slate-900 p-6 rounded-[32px] border border-white/5 mb-6">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-2xl">👤</div>
                <div>
                    <input type="text" id="user-tg" placeholder="@telegram_adiniz" class="bg-transparent border-b border-white/20 outline-none font-bold text-lg w-full">
                    <p class="text-xs text-blue-400">Telegram Profiliniz</p>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-white/5 p-4 rounded-2xl text-center">
                    <p class="text-[10px] uppercase opacity-50">Elanlarım</p>
                    <span id="my-ads-count" class="text-xl font-bold">0</span>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl text-center">
                    <p class="text-[10px] uppercase opacity-50">Görülmə</p>
                    <span class="text-xl font-bold">0</span>
                </div>
            </div>

            <button onclick="openModal('addAdModal')" class="w-full bg-blue-600 py-4 rounded-2xl font-extrabold text-sm uppercase tracking-widest shadow-lg shadow-blue-600/20">
                + YENİ ELAN ƏLAVƏ ET
            </button>
        </div>
    </div>

    <div id="addAdModal" class="full-modal">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold">Yeni Elan</h2>
            <button onclick="closeModal('addAdModal')" class="text-gray-400">Bağla</button>
        </div>
        
        <div class="space-y-4">
            <div class="bg-slate-900 p-4 rounded-2xl">
                <label class="text-xs text-gray-500 block mb-2 uppercase font-bold">Məhsulun Şəkli</label>
                <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleFile(event)">
                <div onclick="document.getElementById('file-input').click()" id="preview-box" class="w-full aspect-square bg-white/5 border-2 border-dashed border-white/10 rounded-2xl flex items-center justify-center cursor-pointer overflow-hidden">
                    <span id="preview-text">📸 Şəkil seçin</span>
                </div>
            </div>

            <input type="text" id="ad-title" placeholder="Elan başlığı" class="w-full bg-slate-900 p-4 rounded-2xl outline-none border border-white/5 focus:border-blue-600">
            <input type="number" id="ad-price" placeholder="Qiymət (AZN)" class="w-full bg-slate-900 p-4 rounded-2xl outline-none border border-white/5 focus:border-blue-600">
            <textarea id="ad-desc" placeholder="Ətraflı məlumat..." class="w-full bg-slate-900 p-4 rounded-2xl outline-none border border-white/5 focus:border-blue-600 h-32"></textarea>
            
            <button onclick="uploadAd()" class="w-full bg-blue-600 py-5 rounded-2xl font-black shadow-xl shadow-blue-600/30">PAYLAŞ</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchPage('elanlar')">
            <p class="text-[10px] font-bold">ELANLAR</p>
        </div>
        <div class="nav-item" onclick="switchPage('chat')">
            <p class="text-[10px] font-bold">CHAT</p>
        </div>
        <div class="nav-item" onclick="switchPage('profil')">
            <p class="text-[10px] font-bold">PROFİLİM</p>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArs4cKGTuTgFjztdMueDn5qurmmX_hJUs",
            authDomain: "elan-9616a.firebaseapp.com",
            projectId: "elan-9616a",
            storageBucket: "elan-9616a.firebasestorage.app",
            messagingSenderId: "382076476608",
            appId: "1:382076476608:web:bc158becb22496ff066125"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentImg = "";

        // Səhifə idarəetməsi
        window.switchPage = (p) => {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(p+'-page').classList.add('active');
            event.currentTarget.classList.add('active');
        };

        window.openModal = (id) => document.getElementById(id).style.display = 'block';
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';

        // Şəkil oxuma
        window.handleFile = (e) => {
            const reader = new FileReader();
            reader.onload = () => {
                currentImg = reader.result;
                document.getElementById('preview-box').innerHTML = `<img src="${currentImg}" class="w-full h-full object-cover">`;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // Elan paylaşmaq
        window.uploadAd = async () => {
            const title = document.getElementById('ad-title').value;
            const price = document.getElementById('ad-price').value;
            const desc = document.getElementById('ad-desc').value;
            const tg = document.getElementById('user-tg').value;

            if(!title || !price || !currentImg || !tg) return alert("Bütün xanaları doldurun!");

            await addDoc(collection(db, "ads"), {
                title, price, desc, image: currentImg, tg: tg,
                createdAt: serverTimestamp()
            });

            alert("Elan paylaşıldı!");
            closeModal('addAdModal');
        };

        // Elanları gətirmək (2-2 Grid)
        onSnapshot(query(collection(db, "ads"), orderBy("createdAt", "desc")), (snap) => {
            const list = document.getElementById('ads-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                list.innerHTML += `
                    <div class="ad-card">
                        <img src="${data.image}" class="ad-image">
                        <div class="ad-info">
                            <h3 class="ad-title">${data.title}</h3>
                            <p class="ad-price">${data.price} AZN</p>
                            <a href="https://t.me/${data.tg.replace('@','')}" class="btn-contact">ƏLAQƏ SAXLA</a>
                        </div>
                    </div>
                `;
            });
        });

    </script>
</body>
</html>
