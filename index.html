<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ElanımAz TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        :root { --tg-theme-bg: #0f172a; --tg-blue: #3b82f6; }
        body { font-family: 'Outfit', sans-serif; background: var(--tg-theme-bg); color: white; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 2-2 Grid */
        .ads-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .ad-card { border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; background: #1e293b; }
        .ad-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        
        /* Chat Style */
        .chat-bubble { padding: 10px 15px; border-radius: 18px; max-width: 80%; margin-bottom: 8px; font-size: 14px; }
        .my-msg { background: var(--tg-blue); align-self: flex-end; margin-left: auto; }
        .their-msg { background: rgba(255,255,255,0.1); align-self: flex-start; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="p-5 flex justify-between items-center bg-slate-900/50">
        <h1 class="text-xl font-black">ELANIM<span class="text-blue-500">AZ</span></h1>
        <div id="user-pill" class="text-[10px] bg-blue-500/20 px-3 py-1 rounded-full border border-blue-500/30 text-blue-400 font-bold">Yüklənir...</div>
    </div>

    <main>
        <div id="page-home" class="page active">
            <div class="ads-grid" id="ads-list"></div>
        </div>

        <div id="page-chat" class="page">
            <div class="p-4">
                <div onclick="openGlobalChat()" class="glass p-5 rounded-2xl mb-4 border-l-4 border-yellow-500 flex justify-between items-center cursor-pointer">
                    <div>
                        <h3 class="font-bold text-yellow-500 text-sm">🌍 GLOBAL CHAT</h3>
                        <p class="text-[10px] opacity-50">Hamı burada danışır</p>
                    </div>
                    <span>➜</span>
                </div>
                <h3 class="text-xs font-bold opacity-30 mb-3 uppercase tracking-widest">Şəxsi Mesajlar</h3>
                <div id="chat-list" class="space-y-2"></div>
            </div>
        </div>

        <div id="page-profile" class="page px-5">
            <div class="glass p-8 rounded-[35px] text-center mt-5">
                <img id="user-photo" src="" class="w-20 h-20 rounded-full mx-auto mb-3 border-2 border-blue-500 p-1 hidden">
                <h2 id="user-full-name" class="text-xl font-bold">İstifadəçi</h2>
                <p id="user-handle" class="text-xs text-blue-400 opacity-60 mb-6">@username</p>
                <button onclick="toggleModal('addModal')" class="w-full bg-blue-600 py-4 rounded-2xl font-black shadow-lg">🚀 ELAN PAYLAŞ</button>
            </div>
        </div>
    </main>

    <div id="addModal" class="fixed inset-0 bg-black/90 z-[2000] hidden p-6 overflow-y-auto">
        <div class="flex justify-between mb-8">
            <h2 class="text-2xl font-bold">Yeni Elan</h2>
            <button onclick="toggleModal('addModal')">❌</button>
        </div>
        <input type="file" id="file-in" class="hidden" onchange="handleImg(event)">
        <div onclick="document.getElementById('file-in').click()" id="pre-box" class="w-full aspect-video glass rounded-3xl flex items-center justify-center mb-4 border-2 border-dashed border-white/10">
            📸 Şəkil seç
        </div>
        <input type="text" id="in-title" placeholder="Başlıq" class="w-full bg-white/5 p-4 rounded-2xl mb-3 outline-none">
        <input type="number" id="in-price" placeholder="Qiymət (AZN)" class="w-full bg-white/5 p-4 rounded-2xl mb-3 outline-none">
        <textarea id="in-desc" placeholder="Məhsul haqqında..." class="w-full bg-white/5 p-4 rounded-2xl mb-6 h-32 outline-none"></textarea>
        <button onclick="saveAd()" class="w-full bg-blue-600 py-4 rounded-2xl font-black">PAYLAŞ</button>
    </div>

    <div id="chatModal" class="fixed inset-0 bg-slate-900 z-[3000] hidden flex flex-col">
        <div class="p-4 bg-slate-800 flex justify-between items-center">
            <h3 id="chat-target-name" class="font-bold">Chat</h3>
            <button onclick="toggleModal('chatModal')">Bağla</button>
        </div>
        <div id="messages-container" class="flex-1 p-4 overflow-y-auto flex flex-col"></div>
        <div class="p-4 bg-slate-800 flex gap-2">
            <input type="text" id="msg-input" placeholder="Mesaj yaz..." class="flex-1 bg-white/5 p-3 rounded-xl outline-none">
            <button onclick="sendMsg()" class="bg-blue-600 px-5 rounded-xl font-bold">GÖNDƏR</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div onclick="showPage('home')" class="text-[10px] font-bold opacity-40 hover:opacity-100">ELANLAR</div>
        <div onclick="showPage('chat')" class="text-[10px] font-bold opacity-40 hover:opacity-100">MESAJLAR</div>
        <div onclick="showPage('profile')" class="text-[10px] font-bold opacity-40 hover:opacity-100">PROFİL</div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArs4cKGTuTgFjztdMueDn5qurmmX_hJUs",
            authDomain: "elan-9616a.firebaseapp.com",
            projectId: "elan-9616a",
            storageBucket: "elan-9616a.firebasestorage.app",
            messagingSenderId: "382076476608",
            appId: "1:382076476608:web:bc158becb22496ff066125"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        tg.expand();

        // TG Məlumatlarını Bağla
        const user = tg.initDataUnsafe?.user || { id: "test_id", first_name: "Developer", username: "dev" };
        document.getElementById('user-pill').innerText = user.first_name;
        document.getElementById('user-full-name').innerText = user.first_name + (user.last_name ? " " + user.last_name : "");
        document.getElementById('user-handle').innerText = "@" + (user.username || "yoxdur");
        if(user.photo_url) {
            document.getElementById('user-photo').src = user.photo_url;
            document.getElementById('user-photo').classList.remove('hidden');
        }

        let selectedImg = "";
        let activeChatRoom = "global";

        // Elanlar (Realtime 2-2)
        onSnapshot(query(collection(db, "ads"), orderBy("createdAt", "desc")), (snap) => {
            const list = document.getElementById('ads-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `
                    <div class="ad-card glass shadow-lg">
                        <img src="${d.img}" class="ad-img">
                        <div class="p-3">
                            <h3 class="text-[11px] font-bold h-8 truncate">${d.title}</h3>
                            <p class="text-blue-400 font-black text-sm">${d.price} AZN</p>
                            <button onclick="initChat('${d.userId}', '${d.userName}')" class="w-full bg-blue-600/20 text-blue-400 py-2 mt-2 rounded-lg text-[10px] font-bold border border-blue-500/30">💬 ƏLAQƏ</button>
                        </div>
                    </div>`;
            });
        });

        // Mesajlaşma Sistemi
        window.initChat = (targetId, targetName) => {
            if(targetId == user.id) return alert("Öz elanınıza yaza bilməzsiniz!");
            activeChatRoom = [user.id, targetId].sort().join("_");
            document.getElementById('chat-target-name').innerText = targetName;
            toggleModal('chatModal');
            loadMessages();
        };

        window.openGlobalChat = () => {
            activeChatRoom = "global";
            document.getElementById('chat-target-name').innerText = "🌍 Global Chat";
            toggleModal('chatModal');
            loadMessages();
        };

        function loadMessages() {
            const msgBox = document.getElementById('messages-container');
            onSnapshot(query(collection(db, "messages"), where("room", "==", activeChatRoom), orderBy("at", "asc")), (snap) => {
                msgBox.innerHTML = "";
                snap.forEach(m => {
                    const data = m.data();
                    const isMe = data.uid == user.id;
                    msgBox.innerHTML += `<div class="chat-bubble ${isMe ? 'my-msg' : 'their-msg'}">
                        <p class="text-[8px] opacity-50">${data.name}</p>
                        ${data.txt}
                    </div>`;
                });
                msgBox.scrollTop = msgBox.scrollHeight;
            });
        }

        window.sendMsg = async () => {
            const inp = document.getElementById('msg-input');
            if(!inp.value) return;
            await addDoc(collection(db, "messages"), {
                room: activeChatRoom, txt: inp.value, uid: user.id, name: user.first_name, at: serverTimestamp()
            });
            inp.value = "";
        };

        // Elan Paylaş
        window.saveAd = async () => {
            const t = document.getElementById('in-title').value;
            const p = document.getElementById('in-price').value;
            const d = document.getElementById('in-desc').value;
            if(!t || !p || !selectedImg) return alert("Xanaları doldurun!");

            await addDoc(collection(db, "ads"), {
                title: t, price: p, desc: d, img: selectedImg, 
                userId: user.id, userName: user.first_name, createdAt: serverTimestamp()
            });
            tg.showAlert("Təbrik edirik! Elanınız uğurla paylaşıldı. 🚀");
            toggleModal('addModal');
        };

        window.handleImg = (e) => {
            const r = new FileReader();
            r.onload = () => {
                selectedImg = r.result;
                document.getElementById('pre-box').innerHTML = `<img src="${selectedImg}" class="w-full h-full object-cover rounded-3xl">`;
            };
            r.readAsDataURL(e.target.files[0]);
        };

        // UI
        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
        };
        window.toggleModal = (id) => {
            const m = document.getElementById(id);
            m.classList.toggle('hidden');
            if(!m.classList.contains('hidden')) m.style.display = 'flex';
            else m.style.display = 'none';
        };
    </script>
</body>
</html>
