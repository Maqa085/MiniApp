<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElanımAz | Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background: radial-gradient(circle at top, #1e3a8a 0%, #0f172a 100%); 
            color: white; 
            padding-bottom: 110px;
            min-height: 100vh;
        }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 450px; z-index: 1000; border-radius: 30px; }
        
        .ads-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .ad-card { border-radius: 24px; overflow: hidden; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .ad-card:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.2); }
        .ad-card img { width: 100%; height: 160px; object-fit: cover; }
        
        .page { display: none; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        input, textarea { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; transition: 0.3s; }
        input:focus { border-color: #3b82f6 !important; background: rgba(255,255,255,0.1) !important; }

        .tg-input { border-radius: 18px; padding: 15px; width: 100%; margin-bottom: 12px; }
    </style>
</head>
<body>

    <header class="p-6 text-center">
        <h1 class="text-3xl font-extrabold tracking-tighter">ELANIM<span class="text-blue-500">AZ</span></h1>
        <p class="text-blue-300/60 text-xs mt-1 uppercase tracking-widest">Premium Elan Platforması</p>
    </header>

    <main>
        <div id="page-elanlar" class="page active">
            <div id="ads-container" class="ads-grid">
                </div>
        </div>

        <div id="page-chat" class="page px-6 py-10 text-center">
            <div class="glass p-10 rounded-[30px]">
                <div class="text-5xl mb-4">💬</div>
                <h2 class="text-xl font-bold">Mesajlar</h2>
                <p class="text-white/40 text-sm mt-2">Hələlik heç bir aktiv söhbət tapılmadı.</p>
            </div>
        </div>

        <div id="page-profil" class="page px-6">
            <div class="glass p-8 rounded-[35px] text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-blue-500"></div>
                <div class="w-24 h-24 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl shadow-xl border-4 border-white/5">👤</div>
                
                <input type="text" id="tg-username" placeholder="@telegram_adiniz" class="tg-input text-center font-bold" onchange="saveProfile()">
                <p class="text-[10px] text-blue-400 uppercase tracking-tighter mb-6">Telegram profilinizlə əlaqələndirilir</p>

                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="glass p-4 rounded-2xl">
                        <p class="text-[10px] opacity-50 uppercase">Elanlarım</p>
                        <span class="text-xl font-bold">0</span>
                    </div>
                    <div class="glass p-4 rounded-2xl">
                        <p class="text-[10px] opacity-50 uppercase">Aktiv</p>
                        <span class="text-xl font-bold">Bəli</span>
                    </div>
                </div>

                <button onclick="toggleModal('postModal')" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold shadow-lg shadow-blue-600/20 transition-all active:scale-95">
                    🚀 Yeni Elan Yerləşdir
                </button>
            </div>
        </div>
    </main>

    <div id="postModal" class="modal">
        <div class="glass w-full max-w-md p-8 rounded-[40px]">
            <h2 class="text-2xl font-black mb-6">Elan Detalları</h2>
            
            <input type="text" id="p-title" placeholder="Nə satırsınız?" class="tg-input">
            <input type="number" id="p-price" placeholder="Qiymət (AZN)" class="tg-input">
            <textarea id="p-desc" placeholder="Məhsul haqqında qısa məlumat..." class="tg-input h-32"></textarea>
            
            <input type="file" id="p-file" class="hidden" accept="image/*" onchange="handleImage(event)">
            <label for="p-file" id="file-label" class="block w-full p-4 border-2 border-dashed border-blue-500/30 rounded-2xl text-center mb-6 cursor-pointer hover:bg-blue-500/10 transition-all text-sm text-blue-300">
                🖼️ Şəkil Seç (Maks. 1MB)
            </label>

            <div class="flex gap-3">
                <button onclick="toggleModal('postModal')" class="flex-1 bg-white/5 py-4 rounded-2xl font-bold">Geri</button>
                <button onclick="submitAd()" class="flex-1 bg-blue-600 py-4 rounded-2xl font-bold shadow-lg shadow-blue-600/40">Paylaş</button>
            </div>
        </div>
    </div>

    <nav class="nav-container glass flex justify-around p-2 shadow-2xl">
        <button onclick="changePage('elanlar')" class="flex-1 py-4 text-[10px] font-bold tracking-widest uppercase opacity-40 hover:opacity-100 transition-all">Elanlar</button>
        <button onclick="changePage('chat')" class="flex-1 py-4 text-[10px] font-bold tracking-widest uppercase opacity-40 hover:opacity-100 transition-all">Chat</button>
        <button onclick="changePage('profil')" class="flex-1 py-4 text-[10px] font-bold tracking-widest uppercase opacity-40 hover:opacity-100 transition-all">Profil</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArs4cKGTuTgFjztdMueDn5qurmmX_hJUs",
            authDomain: "elan-9616a.firebaseapp.com",
            projectId: "elan-9616a",
            storageBucket: "elan-9616a.firebasestorage.app",
            messagingSenderId: "382076476608",
            appId: "1:382076476608:web:bc158becb22496ff066125"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let selectedImageBase64 = "";

        // Profil Yadda Saxla
        window.saveProfile = () => {
            const user = document.getElementById('tg-username').value;
            localStorage.setItem('elan_tg_user', user);
        };

        window.onload = () => {
            const saved = localStorage.getItem('elan_tg_user');
            if(saved) document.getElementById('tg-username').value = saved;
        };

        // Şəkil emalı
        window.handleImage = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                selectedImageBase64 = reader.result;
                document.getElementById('file-label').innerText = "✅ Şəkil seçildi: " + file.name;
                document.getElementById('file-label').style.borderColor = "#22c55e";
            };
            reader.readAsDataURL(file);
        };

        // Elanları Çəkmək
        onSnapshot(query(collection(db, "ads"), orderBy("createdAt", "desc")), (snap) => {
            const container = document.getElementById('ads-container');
            container.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                container.innerHTML += `
                    <div class="ad-card glass shadow-lg">
                        <img src="${data.image || 'https://via.placeholder.com/200'}">
                        <div class="p-4">
                            <p class="text-[10px] opacity-40 uppercase truncate">${data.title}</p>
                            <p class="text-blue-400 font-black text-lg">${data.price} AZN</p>
                            <a href="https://t.me/${data.tgUser.replace('@','')}" class="text-[9px] text-white/30 hover:text-blue-400">@${data.tgUser}</a>
                        </div>
                    </div>
                `;
            });
        });

        // Elan Paylaşmaq
        window.submitAd = async () => {
            const title = document.getElementById('p-title').value;
            const price = document.getElementById('p-price').value;
            const desc = document.getElementById('p-desc').value;
            const tgUser = document.getElementById('tg-username').value;

            if(!title || !price || !tgUser) return alert("Başlıq, Qiymət və Telegram adınızı yazın!");
            if(!selectedImageBase64) return alert("Zəhmət olmasa şəkil seçin!");

            await addDoc(collection(db, "ads"), {
                title, price, desc, image: selectedImageBase64,
                tgUser: tgUser,
                createdAt: serverTimestamp()
            });

            toggleModal('postModal');
            alert("Elan paylaşıldı!");
        };

        // Naviqasiya
        window.changePage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
        };

        window.toggleModal = (id) => {
            const m = document.getElementById(id);
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        };
    </script>
</body>
                    </html>
